<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>채널픽 - 소규모 유튜버 추천</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #111;
    }

    p {
      margin: 8px 0;
      color: #666;
      line-height: 1.5;
    }

    .highlight {
      color: #2563eb;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1e4fd8;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }

    .footer a {
      color: #999;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>채널픽</h1>

    <p>
      <span class="highlight">나만 알기 아까운 유튜브 채널</span>을  
      발견하고 공유하세요.
    </p>

    <p>
      소규모 유튜버를 위한 추천 플랫폼
    </p>

    <a class="btn" href="https://channelpick.vercel.app/channelpick/privacy.html">
      개인정보처리방침
    </a>

    <div class="footer">
      © 2026 ChannelPick
    </div>
  </div>

</body>
</html>
